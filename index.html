<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Broker Pro+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
    
<div id="modoAtual"></div>

<div id="loginScreen">
  <div class="loginBox">
    <h2>Broker Pro+</h2>

    <input type="text" id="username" placeholder="Usuário">
    <input type="password" id="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>
    <button onclick="register()">Cadastrar</button>

    <p id="loginMsg"></p>
  </div>
</div>

<div id="app" style="display:none;">

<header>
  <h1>📊 Broker Pro+</h1>
  <div>Usuário: <span id="userDisplay"></span></div>
  <div>Saldo: R$ <span id="saldo"></span></div>
  <div>Patrimônio: R$ <span id="patrimonio"></span></div>
  <div>Rentabilidade: <span id="rentabilidade"></span></div>
  <button onclick="logout()">Sair</button>

<div>
  Mercado:
<select id="modoMercado">
  <option value="bull">Alta 📈</option>
  <option value="bear">Baixa 📉</option>
  <option value="lateral" selected>Lateral ➡️</option>
  <option value="aleatorio">Aleatório 🎲</option>
</select>
</div>

</header>

<main>

<section>
  <h2>📈 Mercado</h2>
  <div id="ativos"></div>
</section>

<section>
  <h2>💼 Carteira</h2>
  <div id="carteira"></div>
</section>

<section>
  <h2>📊 Gráfico</h2>
  <canvas id="grafico"></canvas>
</section>

<section>
  <h2>📜 Histórico</h2>
  <div id="historico"></div>
</section>

</main>

</div>

<script src="script.js"></script>
</body>
</html>
